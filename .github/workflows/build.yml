name: Build GyroDrive APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # botão manual na interface do GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}

      - name: Instalar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Compilar APK debug
        run: gradle assembleDebug --no-daemon

      - name: Salvar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: GyroDrive-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
